name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - 'services/api/**'
      - 'infra/cloudflare/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: cd services/api && npm install && npm run build
      - name: Render Wrangler config
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          template = Path('infra/cloudflare/wrangler.toml').read_text()
          for key in [
              'CF_ACCOUNT_ID',
              'CF_PROD_DATABASE_ID',
              'CF_PROD_KV_ID',
              'CF_STAGING_DATABASE_ID',
              'CF_STAGING_KV_ID',
          ]:
              template = template.replace(f'${{{key}}}', os.environ[key])

          Path('/tmp/wrangler.toml').write_text(template)
          print('Rendered /tmp/wrangler.toml')
          print(Path('/tmp/wrangler.toml').read_text())
          PY
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROD_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CF_PROD_KV_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CF_STAGING_DATABASE_ID: ${{ secrets.CLOUDFLARE_STAGING_D1_DATABASE_ID }}
          CF_STAGING_KV_ID: ${{ secrets.CLOUDFLARE_STAGING_KV_NAMESPACE_ID }}
      - name: Deploy with Wrangler CLI
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          cd services/api
          echo "Wrangler version:"
          npx wrangler --version || true
          echo "Deploying with rendered config..."
          npx wrangler deploy --apiToken "$CLOUDFLARE_API_TOKEN" --config /tmp/wrangler.toml --env production
          
