name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - 'services/api/**'
      - 'infra/cloudflare/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: cd services/api && npm install && npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: services/api
          command: deploy --config ../../infra/cloudflare/wrangler.toml --env production
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROD_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CF_PROD_KV_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CF_STAGING_DATABASE_ID: ${{ secrets.CLOUDFLARE_STAGING_D1_DATABASE_ID }}
          CF_STAGING_KV_ID: ${{ secrets.CLOUDFLARE_STAGING_KV_NAMESPACE_ID }}
          
